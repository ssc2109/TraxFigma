<script>
    const thumb = document.getElementById('slider-thumb');
    const track = document.getElementById('slider-track');
    const text = document.getElementById('slider-text');
    const totalLabel = document.getElementById('slider-total');
    
    let isDragging = false;
    let startX = 0;
    let currentX = 0;
    const maxSlide = track.clientWidth - thumb.clientWidth - 8; // Adjust for padding

    const onStart = (e) => {
      isDragging = true;
      startX = (e.type === 'touchstart' ? e.touches[0].clientX : e.clientX) - currentX;
      thumb.classList.add('scale-95');
    };

    const onMove = (e) => {
      if (!isDragging) return;
      
      const x = (e.type === 'touchmove' ? e.touches[0].clientX : e.clientX) - startX;
      
      if (x >= 0 && x <= maxSlide) {
        currentX = x;
        thumb.style.transform = `translateX(${currentX}px)`;
        
        // Fade text and total based on progress
        const progress = currentX / maxSlide;
        text.style.opacity = Math.max(0, 1 - progress * 2.5);
        totalLabel.style.opacity = Math.max(0, 1 - progress * 4);
      }
    };

    const onEnd = () => {
      if (!isDragging) return;
      isDragging = false;
      thumb.classList.remove('scale-95');

      if (currentX >= maxSlide * 0.9) {
        // Successful slide
        currentX = maxSlide;
        thumb.style.transform = `translateX(${maxSlide}px)`;
        thumb.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
        
        // Visual feedback
        setTimeout(() => {
            track.style.background = '#ffffff';
            thumb.style.background = '#000000';
            thumb.querySelector('span').style.color = '#ffffff';
            thumb.querySelector('span').innerText = 'check';
        }, 100);

      } else {
        // Reset
        currentX = 0;
        thumb.style.transform = 'translateX(0)';
        thumb.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
        text.style.opacity = '1';
        totalLabel.style.opacity = '1';
        
        setTimeout(() => {
          thumb.style.transition = '';
        }, 400);
      }
    };

    thumb.addEventListener('mousedown', onStart);
    thumb.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);

    // Micro-interactions for other buttons
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', () => {
        btn.classList.add('scale-75');
      });
      btn.addEventListener('touchend', () => {
        btn.classList.remove('scale-75');
      });
    });
  </script>
